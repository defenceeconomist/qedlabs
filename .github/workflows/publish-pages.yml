name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      R_VERSION: "4.5.1"
      QUARTO_VERSION: "1.8.26"
      QUARTO_CHROMIUM_ARGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install PyYAML

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Clean Quarto build artifacts
        run: |
          rm -rf docs/_site
          rm -rf docs/.quarto
          rm -rf docs/_freeze

      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install and cache R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          cache-version: 1
          packages: |
            any::sessioninfo
            any::knitr
            any::rmarkdown
            any::MatchIt
            any::WeightIt
            any::cobalt
            any::causaldata
            any::dagitty
            any::did
            any::dplyr
            any::fixest
            any::ggdag
            any::ggplot2
            any::haven
            any::readr
            any::broom
            any::sandwich
            any::boot
            any::nlme

      - name: Render Quarto site
        run: quarto render docs --cache-refresh

      - name: Render Quarto PDFs
        shell: bash
        run: |
          set -euo pipefail
          pdf_docs=()
          while IFS= read -r doc; do
            pdf_docs+=("${doc}")
          done < <(grep -R -n -E '^[[:space:]]*pdf:[[:space:]]*$' docs | awk -F: '$1 ~ /\.qmd$/ {print $1}' | sort -u)
          echo "Rendering ${#pdf_docs[@]} PDF documents"
          for doc in "${pdf_docs[@]}"; do
            echo "::group::quarto render ${doc} --to pdf --log-level debug"
            quarto render "${doc}" --to pdf --log-level debug
            echo "::endgroup::"
          done

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: docs/_site
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
