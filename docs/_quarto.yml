project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - notes/index.qmd
    - notes/**/*.qmd
    - labs/*.qmd
  pre-render:
    - python3 scripts/extract_link_graph.py --output data/notes_link_graph_payload.json --include-prefix notes/
  resources:
    - data/notes_link_graph_payload.json
    - assets/**

website:
  title: "Quasi-Experimental Design Labs"
  navbar:
    left:
      - href: notes/index.qmd
        text: Notes
      - href: labs/index.qmd
        text: Labs
  sidebar:
    - id: notes
      title: "Notes"
      style: docked
      search: true
      contents:
        - href: notes/index.qmd
          text: Notes Overview
        - section: Matching and Weighting
          href: notes/matching/matching-and-weighting.qmd
          contents:
            - href: notes/matching/matching-teaching-data.qmd
              text: Matching Teaching Data
            - href: notes/matching/matching-and-weighting-sources.qmd
              text: Matching and Weighting Sources
            - href: notes/matching/mixtape-matching-subclassification-notes.qmd
              text: Mixtape Matching and Subclassification
            - href: notes/matching/effectbook-matching-notes.qmd
              text: The Effect Matching
            - href: notes/matching/gertler-matching-notes.qmd
              text: Gertler Matching
            - href: notes/matching/abadie-imbens-bias-corrected-matching-notes.qmd
              text: Abadie-Imbens Bias-Corrected Matching
            - href: notes/matching/iacus-king-porro-cem-notes.qmd
              text: Coarsened Exact Matching (CEM)
            - href: notes/matching/lalonde-background-appendix.qmd
              text: LaLonde Background Appendix
            - href: notes/matching/weightit-entropy-balancing-notes.qmd
              text: WeightIt Entropy Balancing
        - section: Synthetic Control
          href: notes/scm/synthetic-control.qmd
          contents:
            - href: notes/scm/synthetic-control-teaching-data.qmd
              text: Synthetic Control Teaching Data
            - href: notes/scm/synthetic-control-sources.qmd
              text: Synthetic Control Sources
        - section: Other Methods
          href: notes/other-methods/index.qmd
          contents:
            - href: notes/other-methods/difference-in-differences.qmd
              text: Difference-in-Differences
            - href: notes/other-methods/regression-discontinuity.qmd
              text: Regression Discontinuity
            - href: notes/other-methods/comparing-methods.qmd
              text: Comparing Methods
            - href: notes/other-methods/choosing-a-method.qmd
              text: Choosing a Method
    - id: labs
      title: "Labs"
      style: docked
      search: true
      contents:
        - href: labs/index.qmd
          text: Labs Overview
        - section: Matching
          contents:
            - href: labs/lalonde-matching-lab.qmd
              text: LaLonde Matching Lab
            - href: labs/black-politicians-lab.qmd
              text: Black Politicians Lab
            - href: labs/nsw-cps-benchmark-lab.qmd
              text: NSW and CPS Benchmark Lab
            - href: labs/hisp-ie-practice-lab.qmd
              text: HISP IE Practice Lab
        - section: Synthetic Control Design
          contents:
            - href: labs/synthetic-control-design-lab.qmd
              text: Synthetic Control Design Lab
            - href: labs/synthetic-control-donor-pool-lab.qmd
              text: Synthetic Control Donor Pool Lab

format:
  html:
    theme: cosmo
    css:
      - assets/css/site.css
      - assets/css/link_network.css
    toc: true
    toc-depth: 3

bibliography: ../evaluation-bibliography.bib
